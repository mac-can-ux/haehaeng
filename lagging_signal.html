<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="후행스팬">
<title>후행스팬 신호</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #0a0e1a; color: #e2e8f0; padding: 16px; min-height: 100vh; max-width: 480px; margin: 0 auto; }

.header { text-align: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #1e2d4a; }
.header h1 { font-size: 15px; font-weight: 700; color: #fff; }
.header p { font-size: 11px; color: #4a6fa5; margin-top: 2px; }

/* 신호박스 */
.signal-box { border-radius: 14px; padding: 18px 16px; margin-bottom: 14px; text-align: center; background: #0f1829; border: 1px solid #1e2d4a; transition: all 0.3s; }
.sig-emoji { font-size: 40px; margin-bottom: 6px; }
.sig-text { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.sig-sub { font-size: 12px; opacity: 0.7; }
.signal-box.strong-up   { border: 2px solid #10b981; background: #052e16; }
.signal-box.weak-up     { border: 1px solid #10b981; background: #0a2d1a; }
.signal-box.strong-down { border: 2px solid #ef4444; background: #2d0a0a; }
.signal-box.weak-down   { border: 1px solid #ef4444; background: #1a0a0a; }
.signal-box.neutral     { border: 1px solid #f59e0b; background: #1a1500; }

/* 결과 3칸 */
.r3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.rc { background: #0f1829; border-radius: 10px; padding: 12px 6px; text-align: center; border: 1px solid #1e2d4a; }
.rv { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.rl { font-size: 10px; color: #4a6fa5; }

/* 업로드 */
.upload-wrap { background: #0f1829; border-radius: 14px; padding: 14px; margin-bottom: 12px; border: 1px solid #1e2d4a; }
.up-title { font-size: 10px; font-weight: 700; color: #4a6fa5; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }

.img-slots { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.slot { position: relative; }
.slot-lbl { font-size: 10px; font-weight: 600; margin-bottom: 5px; }
.slot-lbl.c1 { color: #60a5fa; }
.slot-lbl.c2 { color: #f59e0b; }
.slot-box { border: 2px dashed #1e2d4a; border-radius: 10px; min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; transition: border-color 0.2s; }
.slot-box.has { border-style: solid; border-color: #334155; }
.slot-box input { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 2; }
.slot-box img { width: 100%; height: 80px; object-fit: cover; display: none; border-radius: 8px; }
.slot-box img.show { display: block; }
.slot-icon { font-size: 22px; margin-bottom: 3px; }
.slot-text { font-size: 10px; color: #4a6fa5; }
.slot-check { position: absolute; top: 5px; right: 5px; width: 18px; height: 18px; border-radius: 50%; background: #10b981; color: #fff; font-size: 10px; display: none; align-items: center; justify-content: center; font-weight: 700; z-index: 3; }
.slot-check.show { display: flex; }

.btn-ai { width: 100%; padding: 13px; background: #6d28d9; border: none; border-radius: 10px; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; display: none; margin-bottom: 8px; }
.btn-ai:active { background: #5b21b6; }

/* 분석중 */
.loading { display: none; text-align: center; padding: 14px; }
.ld { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #6d28d9; margin: 0 3px; animation: b 1s infinite; }
.ld:nth-child(2) { animation-delay: .15s; }
.ld:nth-child(3) { animation-delay: .3s; }
@keyframes b { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.ld-text { font-size: 12px; color: #6d28d9; margin-top: 6px; }
.ld-prog { font-size: 11px; color: #4a6fa5; margin-top: 3px; }

/* 읽은값 */
.read-box { background: #0a0e1a; border-radius: 8px; padding: 10px 12px; border: 1px solid #6d28d9; display: none; margin-bottom: 10px; }
.read-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
.read-row:last-child { margin-bottom: 0; }
.read-lbl { color: #94a3b8; }
.read-val { color: #a78bfa; font-weight: 600; }

/* 버튼 */
.btn-calc { width: 100%; padding: 14px; background: #1d4ed8; border: none; border-radius: 10px; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 8px; display: none; }
.btn-calc:active { background: #1e40af; }
.btn-reset { width: 100%; padding: 10px; background: none; border: 1px solid #1e2d4a; border-radius: 10px; color: #4a6fa5; font-size: 13px; cursor: pointer; margin-bottom: 14px; }

/* 상세 */
.detail { background: #0f1829; border-radius: 10px; padding: 12px; border: 1px solid #1e2d4a; margin-bottom: 12px; display: none; }
.det-title { font-size: 10px; font-weight: 700; color: #4a6fa5; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.det-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; padding-bottom: 5px; border-bottom: .5px solid #1e2d4a; }
.det-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.dl { color: #94a3b8; }
.dv { font-weight: 600; }
.green { color: #10b981; }
.red { color: #ef4444; }
.yellow { color: #f59e0b; }
.blue { color: #60a5fa; }
.white { color: #fff; }

/* 이력 */
.hist-wrap { background: #0f1829; border-radius: 12px; padding: 14px; border: 1px solid #1e2d4a; }
.hist-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.hist-title { font-size: 10px; font-weight: 700; color: #4a6fa5; text-transform: uppercase; letter-spacing: 0.08em; }
.btn-clr { font-size: 11px; color: #4a6fa5; background: none; border: none; cursor: pointer; }
.h-list { display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; }
.hi { background: #0a0e1a; border-radius: 8px; padding: 10px 12px; border-left: 3px solid #1e2d4a; }
.hi.up { border-left-color: #10b981; }
.hi.down { border-left-color: #ef4444; }
.hi.neutral { border-left-color: #f59e0b; }
.hi-time { font-size: 10px; color: #4a6fa5; margin-bottom: 2px; }
.hi-desc { font-size: 12px; }
.hi-sub { font-size: 11px; color: #64748b; margin-top: 2px; }
.empty { text-align: center; padding: 20px; color: #2d4a6e; font-size: 12px; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1e3a5f; border: 1px solid #3b82f6; border-radius: 10px; padding: 10px 18px; font-size: 13px; font-weight: 600; color: #60a5fa; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; white-space: nowrap; }
.toast.show { opacity: 1; }
.toast.warn { background: #431407; border-color: #f59e0b; color: #f59e0b; }
</style>
</head>
<body>

<div class="header">
  <h1>후행스팬 신호 계산기</h1>
  <p>이미지 올리면 AI가 자동 분석</p>
</div>

<!-- 신호 -->
<div class="signal-box neutral" id="signal-box">
  <div class="sig-emoji" id="sig-emoji">📊</div>
  <div class="sig-text" id="sig-text">이미지를 올려주세요</div>
  <div class="sig-sub" id="sig-sub">현재봉 + 26봉전 캔들 사진</div>
</div>

<!-- 결과 3칸 -->
<div class="r3" id="r3" style="display:none">
  <div class="rc"><div class="rv" id="rv1">-</div><div class="rl">저항거리</div></div>
  <div class="rc"><div class="rv" id="rv2">-</div><div class="rl">거래강도</div></div>
  <div class="rc"><div class="rv" id="rv3">-</div><div class="rl">총점</div></div>
</div>

<!-- 업로드 -->
<div class="upload-wrap">
  <div class="up-title">📷 차트 이미지 (최대 4장)</div>
  <div class="img-slots">
    <div class="slot">
      <div class="slot-lbl c1">① 현재봉 팝업</div>
      <div class="slot-box" id="box0">
        <input type="file" accept="image/*" onchange="onImg(event,0)">
        <div class="slot-icon">📊</div>
        <div class="slot-text">현재봉</div>
        <img id="th0"><div class="slot-check" id="ck0">✓</div>
      </div>
    </div>
    <div class="slot">
      <div class="slot-lbl c2">② 26봉전 캔들</div>
      <div class="slot-box" id="box1">
        <input type="file" accept="image/*" onchange="onImg(event,1)">
        <div class="slot-icon">📉</div>
        <div class="slot-text">26봉전</div>
        <img id="th1"><div class="slot-check" id="ck1">✓</div>
      </div>
    </div>
  </div>
  <div id="extra-slots"></div>
  <button class="btn-reset" style="margin-bottom:8px" onclick="addSlot()">+ 이미지 추가</button>

  <button class="btn-ai" id="btn-ai" onclick="analyzeAll()">🔍 AI 자동 분석</button>

  <div class="loading" id="loading">
    <div><span class="ld"></span><span class="ld"></span><span class="ld"></span></div>
    <div class="ld-text">이미지 분석 중...</div>
    <div class="ld-prog" id="ld-prog"></div>
  </div>

  <!-- 읽은 값 -->
  <div class="read-box" id="read-box">
    <div class="read-row"><span class="read-lbl">현재가</span><span class="read-val" id="rv-price">-</span></div>
    <div class="read-row"><span class="read-lbl">선행스팬1</span><span class="read-val" id="rv-span1">-</span></div>
    <div class="read-row"><span class="read-lbl">거래대금</span><span class="read-val" id="rv-vol">-</span></div>
    <div class="read-row"><span class="read-lbl">26봉전 고가</span><span class="read-val" id="rv-h26">-</span></div>
    <div class="read-row"><span class="read-lbl">26봉전 저가</span><span class="read-val" id="rv-l26">-</span></div>
    <div class="read-row"><span class="read-lbl">봉 시간</span><span class="read-val" id="rv-time">-</span></div>
  </div>
</div>

<button class="btn-calc" id="btn-calc" onclick="calcSignal()">📊 신호 계산</button>
<button class="btn-reset" onclick="resetAll()">초기화</button>

<!-- 상세 -->
<div class="detail" id="detail">
  <div class="det-title">공식 상세</div>
  <div class="det-row"><span class="dl">공식1 저항거리 (저가기준)</span><span class="dv" id="d1">-</span></div>
  <div class="det-row"><span class="dl">공식2 거래강도</span><span class="dv" id="d2">-</span></div>
  <div class="det-row"><span class="dl">공식3 선행스팬1 위치</span><span class="dv" id="d3">-</span></div>
  <div class="det-row"><span class="dl">후행스팬 위치</span><span class="dv" id="d4">-</span></div>
  <div class="det-row"><span class="dl">총점</span><span class="dv white" id="d5">-</span></div>
</div>

<!-- 이력 -->
<div class="hist-wrap">
  <div class="hist-hd">
    <span class="hist-title">계산 이력</span>
    <button class="btn-clr" onclick="clearHist()">삭제</button>
  </div>
  <div class="h-list" id="h-list"><div class="empty">아직 이력 없음</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
let imgs = [null,null,null,null];
let slotN = 2;
let parsed = {};
let hist = JSON.parse(localStorage.getItem('ls_v2')||'[]');

function onImg(e, idx) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    imgs[idx] = ev.target.result.split(',')[1];
    const th = document.getElementById('th'+idx);
    const bx = document.getElementById('box'+idx);
    const ck = document.getElementById('ck'+idx);
    th.src = ev.target.result; th.classList.add('show');
    bx.classList.add('has'); ck.classList.add('show');
    document.getElementById('btn-ai').style.display = 'block';
  };
  r.readAsDataURL(file);
}

function addSlot() {
  if (slotN >= 4) { showToast('최대 4장', 'warn'); return; }
  const idx = slotN;
  const ex = document.getElementById('extra-slots');
  const d = document.createElement('div');
  d.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px';
  d.innerHTML = `<div class="slot">
    <div class="slot-lbl" style="color:#94a3b8;font-size:10px;font-weight:600;margin-bottom:5px">${['③','④'][idx-2]} 추가</div>
    <div class="slot-box" id="box${idx}">
      <input type="file" accept="image/*" onchange="onImg(event,${idx})">
      <div class="slot-icon">📎</div><div class="slot-text">추가</div>
      <img id="th${idx}"><div class="slot-check" id="ck${idx}">✓</div>
    </div>
  </div>`;
  ex.appendChild(d); slotN++;
}

async function analyzeOne(b64, idx, total) {
  document.getElementById('ld-prog').textContent = `${idx+1}/${total} 분석 중...`;
  const isFirst = idx === 0;
  const prompt = isFirst
    ? `차트 이미지에서 일목균형표 팝업 데이터 읽기. JSON만 반환, 다른말 없이:
{"time":"HH:MM:SS","close":종가숫자,"span1":선행스팬1숫자,"vol":거래대금숫자단위만원,"high26":null,"low26":null}`
    : `차트 이미지에서 26봉전 캔들 고가저가 읽기. JSON만:
{"time":null,"close":null,"span1":null,"vol":null,"high26":고가숫자,"low26":저가숫자}`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-6', max_tokens: 300,
      messages: [{role:'user', content:[
        {type:'image', source:{type:'base64', media_type:'image/jpeg', data:b64}},
        {type:'text', text:prompt}
      ]}]
    })
  });
  const data = await res.json();
  const text = data.content?.[0]?.text || '';
  return JSON.parse(text.replace(/```json|```/g,'').trim());
}

async function analyzeAll() {
  const active = imgs.filter(i=>i);
  if (!active.length) return;
  document.getElementById('btn-ai').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('read-box').style.display = 'none';

  try {
    let merged = {time:null,close:null,span1:null,vol:null,high26:null,low26:null};
    for (let i=0; i<imgs.length; i++) {
      if (!imgs[i]) continue;
      const r = await analyzeOne(imgs[i], i, active.length);
      Object.keys(merged).forEach(k => { if (r[k] !== null && r[k] !== undefined) merged[k] = r[k]; });
    }
    parsed = merged;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('read-box').style.display = 'block';
    document.getElementById('btn-ai').style.display = 'block';
    document.getElementById('btn-calc').style.display = 'block';

    document.getElementById('rv-price').textContent = merged.close ? merged.close.toLocaleString()+'원' : '-';
    document.getElementById('rv-span1').textContent = merged.span1 ? merged.span1.toLocaleString()+'원' : '-';
    document.getElementById('rv-vol').textContent   = merged.vol   ? merged.vol.toLocaleString()+'만원' : '-';
    document.getElementById('rv-h26').textContent   = merged.high26 ? merged.high26.toLocaleString()+'원' : '-';
    document.getElementById('rv-l26').textContent   = merged.low26  ? merged.low26.toLocaleString()+'원'  : '-';
    document.getElementById('rv-time').textContent  = merged.time || '-';

    showToast('✓ 분석 완료! 신호 계산 버튼 누르세요', '');
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('btn-ai').style.display = 'block';
    showToast('분석 실패 - 다시 시도하세요', 'warn');
  }
}

function calcSignal() {
  const p = parsed;
  if (!p.close || !p.low26 || !p.high26) { showToast('고가/저가 데이터 필요', 'warn'); return; }

  // 공식1: 저항거리
  const distL = p.close - p.low26;
  const distH = p.close - p.high26;

  // 공식2: 거래강도 (거래대금 자체로 판단)
  let volScore = 0, volText = '데이터 없음';
  if (p.vol) {
    if (p.vol > 50000)      { volScore = 2;  volText = '🔥 매우 강함 (+2)'; }
    else if (p.vol > 20000) { volScore = 1;  volText = '💪 강함 (+1)'; }
    else if (p.vol > 5000)  { volScore = 0;  volText = '➡️ 보통 (0)'; }
    else                     { volScore = -1; volText = '😴 약함 (-1)'; }
  }

  // 공식3: 선행스팬1 vs 현재가
  let sp1Score = 0, sp1Text = '데이터 없음';
  if (p.span1) {
    if (p.close > p.span1)       { sp1Score = 1;  sp1Text = '✅ 현재가 > 선행스팬1'; }
    else if (p.close < p.span1)  { sp1Score = -1; sp1Text = '⛔ 현재가 < 선행스팬1'; }
    else                          { sp1Score = 0;  sp1Text = '→ 선행스팬1과 동일'; }
  }

  // 후행스팬 위치
  let lagPos, lagText;
  if (p.close > p.high26)       { lagPos = 1;  lagText = '✅ 캔들 위 (저항돌파)'; }
  else if (p.close >= p.low26)  { lagPos = -1; lagText = '⛔ 캔들 안 (저항걸림)'; }
  else                           { lagPos = -2; lagText = '⚠️ 캔들 아래 (자유낙하)'; }

  // 저항거리 점수
  const distScore = distL > 10000 ? 1 : distL > 0 ? 0 : -1;

  const score = distScore + volScore + sp1Score + lagPos;

  const sig = score >= 3  ? {cls:'strong-up',   e:'🚀', t:'강한 상승',   s:'모든 지표 상승'} :
              score >= 1  ? {cls:'weak-up',     e:'📈', t:'약한 상승',   s:'상승 우세'} :
              score === 0 ? {cls:'neutral',     e:'➡️', t:'중립 관망',    s:'방향 불명확'} :
              score >= -2 ? {cls:'weak-down',   e:'📉', t:'약한 하락',   s:'하락 우세'} :
                            {cls:'strong-down', e:'💥', t:'강한 하락',   s:'모든 지표 하락'};

  // UI
  const sb = document.getElementById('signal-box');
  sb.className = 'signal-box ' + sig.cls;
  document.getElementById('sig-emoji').textContent = sig.e;
  document.getElementById('sig-text').textContent = sig.t;
  document.getElementById('sig-sub').textContent = sig.s;

  document.getElementById('r3').style.display = 'grid';
  const d1e = document.getElementById('rv1');
  d1e.textContent = (distL > 0 ? '+' : '') + (distL/1000).toFixed(1) + 'k';
  d1e.className = 'rv ' + (distL > 5000 ? 'green' : distL > 0 ? 'yellow' : 'red');
  const d2e = document.getElementById('rv2');
  d2e.textContent = p.vol ? (p.vol/10000).toFixed(1)+'억' : '-';
  d2e.className = 'rv ' + (volScore > 0 ? 'green' : volScore < 0 ? 'red' : 'yellow');
  const d3e = document.getElementById('rv3');
  d3e.textContent = (score > 0 ? '+' : '') + score + '점';
  d3e.className = 'rv ' + (score > 0 ? 'green' : score < 0 ? 'red' : 'yellow');

  document.getElementById('detail').style.display = 'block';
  document.getElementById('d1').innerHTML = `<span class="${distScore>0?'green':distScore<0?'red':'yellow'}">${distL>0?'+':''}${distL.toLocaleString()}원 (${distScore>0?'+':''}${distScore}점)</span>`;
  document.getElementById('d2').innerHTML = `<span class="${volScore>0?'green':volScore<0?'red':'yellow'}">${volText}</span>`;
  document.getElementById('d3').innerHTML = `<span class="${sp1Score>0?'green':sp1Score<0?'red':'yellow'}">${sp1Text} (${sp1Score>0?'+':''}${sp1Score}점)</span>`;
  document.getElementById('d4').innerHTML = `<span class="${lagPos>0?'green':'red'}">${lagText} (${lagPos>0?'+':''}${lagPos}점)</span>`;
  document.getElementById('d5').textContent = `${score>0?'+':''}${score}점 → ${sig.t}`;

  const rec = { time: p.time||'--:--', price: p.close, score, sigText: sig.t, distL, lagText, dir: score>0?'up':score<0?'down':'neutral' };
  hist.unshift(rec);
  if (hist.length > 30) hist.pop();
  localStorage.setItem('ls_v2', JSON.stringify(hist));
  renderHist();
  showToast('계산 완료!');
}

function renderHist() {
  const list = document.getElementById('h-list');
  if (!hist.length) { list.innerHTML = '<div class="empty">아직 이력 없음</div>'; return; }
  list.innerHTML = hist.map(r => `
    <div class="hi ${r.dir}">
      <div class="hi-time">${r.time} · ${r.score>0?'+':''}${r.score}점</div>
      <div class="hi-desc">${r.price?.toLocaleString()}원 → ${r.sigText}</div>
      <div class="hi-sub">저항거리 ${r.distL>0?'+':''}${r.distL?.toLocaleString()} · ${r.lagText}</div>
    </div>`).join('');
}

function resetAll() {
  imgs = [null,null,null,null]; parsed = {};
  [0,1,2,3].forEach(i => {
    const th = document.getElementById('th'+i);
    const bx = document.getElementById('box'+i);
    const ck = document.getElementById('ck'+i);
    if (th) { th.src=''; th.classList.remove('show'); }
    if (bx) bx.classList.remove('has');
    if (ck) ck.classList.remove('show');
  });
  document.getElementById('btn-ai').style.display = 'none';
  document.getElementById('btn-calc').style.display = 'none';
  document.getElementById('read-box').style.display = 'none';
  document.getElementById('r3').style.display = 'none';
  document.getElementById('detail').style.display = 'none';
  document.getElementById('signal-box').className = 'signal-box neutral';
  document.getElementById('sig-emoji').textContent = '📊';
  document.getElementById('sig-text').textContent = '이미지를 올려주세요';
  document.getElementById('sig-sub').textContent = '현재봉 + 26봉전 캔들 사진';
}

function clearHist() {
  hist = []; localStorage.setItem('ls_v2', JSON.stringify(hist)); renderHist();
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', 2200);
}

renderHist();
</script>
</body>
</html>
